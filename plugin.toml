[plugin]
name = "Kitty"
description = "Terminal lifecycle plugin: kitty IPC, named workspaces, template-gated restore"
version = "0.1.0"
author = ""
platforms = ["linux", "macos"]

[runtime]
command = "plugin-kitty"
actions = { snapshot = ["snapshot"], restore = ["restore"], settings = ["settings"] }

[daemon]
enabled = true
command = "plugin-kitty"

[menu]
label = "Kitty"
items = [
    { type = "action", id = "snapshot", label = "Snapshot panes", action = "run" },
    { type = "action", id = "restore", label = "Restore panes", action = "run" },
    { type = "action", id = "settings", label = "Settings", action = "settings" },
]

[[dependencies.binaries]]
name = "plugin-kitty"
repo = "qol-tools/plugin-kitty"
pattern = "plugin-kitty-{os}-{arch}"
